<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>韓眉苑｜除色機庫存管理</title>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand:   #b5865a;
    --brand-d: #8c6340;
    --bg:      #faf7f4;
    --card:    #ffffff;
    --border:  #e8ddd4;
    --text:    #2d2016;
    --muted:   #8a7460;
    --drag-over: #fdf0e4;
    --shadow:  0 2px 8px rgba(0,0,0,.08);
    --radius:  12px;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* ─── Header ─── */
  header {
    background: var(--brand);
    color: #fff;
    padding: 14px 16px 10px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: .5px; }
  header p  { font-size: 12px; opacity: .85; margin-top: 2px; }

  /* ─── Nickname banner ─── */
  #nick-banner {
    background: #fff7ed;
    border-bottom: 1px solid #f0d8b8;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  #nick-banner label { color: var(--muted); white-space: nowrap; }
  #nick-input {
    flex: 1; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: 14px; background: #fff;
    outline: none;
  }
  #nick-input:focus { border-color: var(--brand); }
  #nick-badge {
    display: none;
    background: var(--brand); color: #fff;
    border-radius: 20px; padding: 4px 12px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex; background: #fff;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 57px; z-index: 90;
  }
  .tab-btn {
    flex: 1; padding: 12px 0; font-size: 14px; font-weight: 600;
    background: none; border: none; cursor: pointer;
    color: var(--muted); position: relative;
  }
  .tab-btn.active { color: var(--brand); }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: var(--brand);
  }

  /* ─── Tab Panels ─── */
  .panel { display: none; padding: 12px; }
  .panel.active { display: block; }

  /* ─── Branch Cards ─── */
  .branch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .branch-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    min-height: 80px;
    transition: border-color .2s, background .2s;
  }
  .branch-card.drag-over {
    border-color: var(--brand);
    background: var(--drag-over);
  }
  .branch-name {
    font-size: 13px; font-weight: 700;
    color: var(--brand-d); margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .branch-count {
    font-size: 11px; font-weight: 400;
    color: var(--muted);
    background: #f5ece2; border-radius: 10px;
    padding: 1px 7px;
  }
  .machine-list { display: flex; flex-direction: column; gap: 6px; }

  /* ─── Machine Chips ─── */
  .machine-chip {
    background: var(--brand);
    color: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px; font-weight: 600;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: opacity .15s, transform .15s, box-shadow .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .machine-chip::before { content: '⊞'; font-size: 11px; opacity: .75; }
  .machine-chip.dragging {
    opacity: .45;
  }
  /* floating ghost */
  #drag-ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--brand-d); color: #fff;
    border-radius: 8px; padding: 8px 14px;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 6px 20px rgba(0,0,0,.3);
    top: 0; left: 0;
    transform: translate3d(-9999px, -9999px, 0);
    white-space: nowrap;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* ─── Log Panel ─── */
  .log-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .log-header h2 { font-size: 15px; font-weight: 700; }
  #clear-log-btn {
    font-size: 12px; color: #c0392b; background: none; border: none;
    cursor: pointer; padding: 4px 8px;
    border: 1px solid #f0b8b8; border-radius: 6px;
  }
  .log-empty {
    text-align: center; color: var(--muted);
    font-size: 13px; padding: 32px 0;
  }
  .log-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    margin-bottom: 8px; font-size: 13px;
  }
  .log-time { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .log-body { line-height: 1.6; }
  .log-body strong { color: var(--brand-d); }
  .log-arrow { color: var(--brand); margin: 0 4px; }

  /* ─── Toast ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #2d2016; color: #fff;
    border-radius: 20px; padding: 9px 20px;
    font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    z-index: 9998; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>韓眉苑｜除色機庫存管理</h1>
  <p>Demo 版 · 拖拉除色機到目標分店</p>
</header>

<div id="nick-banner">
  <label for="nick-input">操作人：</label>
  <input id="nick-input" type="text" placeholder="請輸入暱稱後才可移動機器" maxlength="20" />
  <span id="nick-badge" title="點擊修改"></span>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="inventory">查看庫存</button>
  <button class="tab-btn" data-tab="log">操作紀錄</button>
</div>

<div id="panel-inventory" class="panel active">
  <div class="branch-grid" id="branch-grid"></div>
</div>

<div id="panel-log" class="panel">
  <div class="log-header">
    <h2>操作紀錄</h2>
    <button id="clear-log-btn">清除紀錄</button>
  </div>
  <div id="log-list"></div>
</div>

<div id="drag-ghost"></div>
<div id="toast"></div>

<script>
const CONFIG = {
  appName: '韓眉苑除色機庫存管理',
  version: '1.0.0-demo',
  branches: ['大中','大社','重安','鳳楠','旗楠','大學','三民','五甲','中庒','前金','屏自'],
  defaultMachines: [
    { id: 'M01', name: '除色機 01', branch: '大中' },
    { id: 'M02', name: '除色機 02', branch: '大社' },
    { id: 'M03', name: '除色機 03', branch: '重安' },
    { id: 'M04', name: '除色機 04', branch: '鳳楠' },
    { id: 'M05', name: '除色機 05', branch: '旗楠' },
    { id: 'M06', name: '除色機 06', branch: '大學' },
    { id: 'M07', name: '除色機 07', branch: '三民' },
    { id: 'M08', name: '除色機 08', branch: '五甲' },
  ],
  dataSource: 'localStorage',
  firebase: { projectId: '', apiKey: '' },
  airtable: { baseId: '', apiKey: '' },
  googleSheet: { sheetId: '', apiKey: '' },
};
const DataLayer = {
  STORAGE_KEY: 'hanmei_machines_v1',
  LOG_KEY: 'hanmei_log_v1',
  async getMachines() {
    if (CONFIG.dataSource === 'localStorage') {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(CONFIG.defaultMachines));
    }
    return JSON.parse(JSON.stringify(CONFIG.defaultMachines));
  },
  async saveMachines(machines) {
    if (CONFIG.dataSource === 'localStorage') localStorage.setItem(this.STORAGE_KEY, JSON.stringify(machines));
  },
  async getLogs() {
    if (CONFIG.dataSource === 'localStorage') {
      const raw = localStorage.getItem(this.LOG_KEY);
      return raw ? JSON.parse(raw) : [];
    }
    return [];
  },
  async appendLog(entry) {
    if (CONFIG.dataSource === 'localStorage') {
      const logs = await this.getLogs();
      logs.unshift(entry);
      localStorage.setItem(this.LOG_KEY, JSON.stringify(logs.slice(0, 500)));
    }
  },
  async clearLogs() {
    if (CONFIG.dataSource === 'localStorage') localStorage.removeItem(this.LOG_KEY);
  },
};
let machines = [], logs = [], nickname = '';
let dragging = { active: false, machineId: null, fromBranch: null, chipEl: null };
async function init() {
  machines = await DataLayer.getMachines();
  logs = await DataLayer.getLogs();
  renderInventory(); renderLogs(); setupNickname(); setupTabs(); setupClearLog();
}
function setupNickname() {
  const input = document.getElementById('nick-input');
  const badge = document.getElementById('nick-badge');
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && input.value.trim()) confirmNick(input.value.trim()); });
  input.addEventListener('blur', () => { if (input.value.trim()) confirmNick(input.value.trim()); });
  badge.addEventListener('click', () => { nickname = ''; badge.style.display = 'none'; input.style.display = ''; input.value = ''; input.focus(); });
}
function confirmNick(val) {
  nickname = val;
  const input = document.getElementById('nick-input');
  const badge = document.getElementById('nick-badge');
  input.style.display = 'none';
  badge.textContent = '👤 ' + val;
  badge.style.display = '';
}
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'log') renderLogs();
    });
  });
}
function renderInventory() {
  const grid = document.getElementById('branch-grid');
  grid.innerHTML = '';
  CONFIG.branches.forEach(branch => {
    const bMachines = machines.filter(m => m.branch === branch);
    const card = document.createElement('div');
    card.className = 'branch-card'; card.dataset.branch = branch;
    const nameRow = document.createElement('div');
    nameRow.className = 'branch-name';
    nameRow.innerHTML = branch + '<span class="branch-count">' + bMachines.length + ' 台</span>';
    const list = document.createElement('div');
    list.className = 'machine-list';
    bMachines.forEach(m => {
      const chip = document.createElement('div');
      chip.className = 'machine-chip';
      chip.textContent = m.id + '｜' + m.name;
      chip.dataset.machineId = m.id; chip.dataset.branch = m.branch;
      attachDragHandlers(chip); list.appendChild(chip);
    });
    card.appendChild(nameRow); card.appendChild(list); grid.appendChild(card);
  });
}
const ghost = document.getElementById('drag-ghost');
let rafId = null, pendingX = 0, pendingY = 0, lastOverCard = null;
function attachDragHandlers(chip) { chip.addEventListener('pointerdown', onPointerDown, { passive: false }); }
function onPointerDown(e) {
  if (!nickname) { showToast('請先輸入操作人暱稱 👆'); document.getElementById('nick-input').focus(); return; }
  e.preventDefault();
  const chip = e.currentTarget;
  chip.setPointerCapture(e.pointerId);
  dragging.active = true; dragging.machineId = chip.dataset.machineId;
  dragging.fromBranch = chip.dataset.branch; dragging.chipEl = chip;
  ghost.textContent = chip.textContent.replace(/^⊞\s*/, '');
  pendingX = e.clientX; pendingY = e.clientY;
  scheduleGhostUpdate(); chip.classList.add('dragging');
  chip.addEventListener('pointermove', onPointerMove);
  chip.addEventListener('pointerup', onPointerUp);
  chip.addEventListener('pointercancel', onPointerCancel);
}
function onPointerMove(e) {
  if (!dragging.active) return; e.preventDefault();
  pendingX = e.clientX; pendingY = e.clientY; scheduleGhostUpdate();
}
function scheduleGhostUpdate() {
  if (rafId) return;
  rafId = requestAnimationFrame(() => {
    rafId = null;
    ghost.style.transform = 'translate3d(' + (pendingX - ghost.offsetWidth/2) + 'px,' + (pendingY - ghost.offsetHeight/2) + 'px,0)';
    const over = getDropTarget(pendingX, pendingY);
    if (over !== lastOverCard) {
      if (lastOverCard) lastOverCard.classList.remove('drag-over');
      if (over) over.classList.add('drag-over');
      lastOverCard = over;
    }
  });
}
function onPointerUp(e) {
  if (!dragging.active) return;
  const target = lastOverCard; cleanup(e.currentTarget);
  if (target) {
    const toBranch = target.dataset.branch;
    if (toBranch !== dragging.fromBranch) moveMachine(dragging.machineId, dragging.fromBranch, toBranch);
    else showToast('已在此分店，無需移動');
  }
  dragging.active = false;
}
function onPointerCancel(e) { cleanup(e.currentTarget); dragging.active = false; }
function cleanup(chip) {
  chip.classList.remove('dragging');
  ghost.style.transform = 'translate3d(-9999px,-9999px,0)';
  if (lastOverCard) { lastOverCard.classList.remove('drag-over'); lastOverCard = null; }
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  chip.removeEventListener('pointermove', onPointerMove);
  chip.removeEventListener('pointerup', onPointerUp);
  chip.removeEventListener('pointercancel', onPointerCancel);
}
function getDropTarget(x, y) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest('.branch-card') : null;
}
async function moveMachine(machineId, fromBranch, toBranch) {
  const machine = machines.find(m => m.id === machineId);
  if (!machine) return;
  machine.branch = toBranch;
  await DataLayer.saveMachines(machines);
  const entry = { id: Date.now().toString(36), ts: new Date().toISOString(), operator: nickname, machineId: machine.id, machineName: machine.name, from: fromBranch, to: toBranch };
  await DataLayer.appendLog(entry); logs.unshift(entry);
  renderInventory(); showToast('✅ ' + machine.id + ' 已移至 ' + toBranch);
}
function renderLogs() {
  const container = document.getElementById('log-list');
  if (logs.length === 0) { container.innerHTML = '<div class="log-empty">尚無操作紀錄</div>'; return; }
  container.innerHTML = logs.map(e => {
    const d = new Date(e.ts);
    const ds = d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    return '<div class="log-item"><div class="log-time">' + ds + '</div><div class="log-body"><strong>' + e.operator + '</strong> 將 <strong>' + e.machineId + '｜' + e.machineName + '</strong> 從 <strong>' + e.from + '</strong><span class="log-arrow">→</span><strong>' + e.to + '</strong></div></div>';
  }).join('');
}
function setupClearLog() {
  document.getElementById('clear-log-btn').addEventListener('click', async () => {
    if (!confirm('確定清除所有操作紀錄？')) return;
    await DataLayer.clearLogs(); logs = []; renderLogs();
  });
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function pad(n) { return String(n).padStart(2, '0'); }
init();
</script>
</body>
</html>
